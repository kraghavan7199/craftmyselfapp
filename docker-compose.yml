services:
  db:
    image: postgres:16-alpine
    container_name: craftmyslef-db
    environment:
      POSTGRES_DB: craftmyslef
      POSTGRES_USER: craftmyslef
      POSTGRES_PASSWORD: craftmyslef
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craftmyslef -d craftmyslef"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: craftmyslef-api
    environment:
      PORT: 3000
      DATABASE_URL: postgres://craftmyslef:craftmyslef@db:5432/craftmyslef
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: craftmyslef-web
    depends_on:
      - api
    ports:
      - "4200:4200"

volumes:
  postgres_data:
